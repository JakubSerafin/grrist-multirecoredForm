<!DOCTYPE html>
<html lang="pl">

<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Odczyt liczników</title>

  <!-- Grist Custom Widget API -->
  <script src="https://docs.getgrist.com/grist-plugin-api.js"></script>

  <!-- Google Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />

  <!-- Styles -->
  <link rel="stylesheet" href="style.css" />
</head>

<body>

  <div class="card">
    <div class="card-header">
      <div class="header-icon">🔢</div>
      <h1>
        Odczyt liczników
        <small>Wprowadź stan liczników i zapisz</small>
      </h1>
    </div>
    <div class="divider"></div>

    <!-- Date field -->
    <div class="field-group">
      <label>
        <span class="label-dot" style="background:#6c63ff;"></span>
        Data odczytu
      </label>
      <input type="date" id="data" />
    </div>

    <!-- Meter fields -->
    <div class="field-group">
      <label>
        <span class="label-dot" style="background:var(--muted);"></span>
        Stan liczników
      </label>
      <div class="meters">

        <!-- Gas -->
        <div class="meter-card" id="card-gaz">
          <div class="meter-icon">🔥</div>
          <div class="meter-info">
            <div class="meter-name" style="color:var(--gas);">Gaz</div>
            <input class="meter-input" type="number" id="gaz" placeholder="np. 1056" min="0" step="0.001" />
            <div class="last-hint" id="hint-gaz"></div>
          </div>
          <div class="meter-unit">m³</div>
        </div>

        <!-- Water -->
        <div class="meter-card" id="card-woda">
          <div class="meter-icon">💧</div>
          <div class="meter-info">
            <div class="meter-name" style="color:var(--water);">Woda</div>
            <input class="meter-input" type="number" id="woda" placeholder="np. 342" min="0" step="0.001" />
            <div class="last-hint" id="hint-woda"></div>
          </div>
          <div class="meter-unit">m³</div>
        </div>

        <!-- Electricity -->
        <div class="meter-card" id="card-prad">
          <div class="meter-icon">⚡</div>
          <div class="meter-info">
            <div class="meter-name" style="color:var(--electric);">Prąd</div>
            <input class="meter-input" type="number" id="prad" placeholder="np. 4520" min="0" step="0.001" />
            <div class="last-hint" id="hint-prad"></div>
          </div>
          <div class="meter-unit">kWh</div>
        </div>

      </div>
    </div>

    <!-- Save button -->
    <button class="btn-save" id="btn-save" onclick="saveRecords()">
      <span class="btn-icon">💾</span>
      <span class="btn-text">Zapisz odczyty</span>
      <div class="spinner"></div>
    </button>

    <!-- Status message -->
    <div id="status"></div>
  </div>

  <!-- Toast notification -->
  <div id="toast"></div>

  <!-- Logic -->
  <script src="script.js"></script>

</body>

</html>
